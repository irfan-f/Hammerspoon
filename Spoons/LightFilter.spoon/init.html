  <script>

    function lightFilterBarElement() {

      let li = document.createElement('li');
      let range = document.createElement('input');
      range.type = 'range';
      range.min = 0;
      range.max = 1;

      range.addEventListener('change', function(el, value) {
        window.webkit.messageHandlers.menubarManager.postMessage({
          type: 'toggleHotkey',
          hotkey: data,
          value: el.target,
        });
      });
      li.textContent = data.title;
      li.appendChild(range);
      return li;
    }

    window.onload = function() {
      let slidersList = document.getElementById('sliders');
