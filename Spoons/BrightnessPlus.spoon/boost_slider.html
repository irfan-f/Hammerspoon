<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brightness Boost</title>
    <style>
      body {
        margin: 0;
        padding: 10px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: transparent;
        color: #ffffff;
      }

      .card {
        background: #2a2a2c;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .heading {
        font-size: 16px;
        font-weight: 650;
        margin: 0 0 10px;
        letter-spacing: 0.2px;
      }

      .sliderRow {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon {
        width: 22px;
        height: 22px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.1);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        user-select: none;
      }

      .icon svg {
        width: 14px;
        height: 14px;
        opacity: 0.92;
      }

      .rangeWrap {
        flex: 1 1 auto;
        min-width: 0;
      }

      input[type="range"] {
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        height: 34px;
        background: transparent;
        margin: 0;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 30px;
        background: #ffffff;
        border-radius: 999px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.12), 0 6px 14px rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(0, 0, 0, 0.06);
        margin-top: 0;
      }

      input[type="range"]:focus {
        outline: none;
      }

      .value {
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.78);
        min-width: 44px;
        text-align: right;
      }

      .help {
        margin-top: 10px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="heading">Brightness boost</div>
      <div class="sliderRow">
        <div class="icon" aria-hidden="true" title="Brightness boost">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"
              stroke="white"
              stroke-width="2"
              opacity="0.95"
            />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              opacity="0.65"
            />
          </svg>
        </div>
        <div class="rangeWrap">
          <input id="boost" type="range" min="0" max="100" step="1" value="BOOST_VALUE" />
        </div>
        <div class="value" id="boostValue">0%</div>
      </div>
      <div class="help">0% turns boost off.</div>
    </div>

    <script>
      const slider = document.getElementById("boost");
      const value = document.getElementById("boostValue");

      function format(v) {
        const n = Number(v);
        if (n > 0) return `+${n}%`;
        return `${n}%`;
      }

      function setValue(v) {
        slider.value = String(v);
        value.textContent = format(v);
      }

      slider.addEventListener("input", () => {
        const v = Number(slider.value);
        value.textContent = format(v);
        try {
          window.webkit.messageHandlers.brightnessPlus.postMessage({
            type: "setBoost",
            value: v,
          });
        } catch (e) {}
      });

      setValue(slider.value);
    </script>
  </body>
</html>
